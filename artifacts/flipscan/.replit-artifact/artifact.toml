kind = "web"
previewPath = "/"
title = "FlipScan"
version = "1.0.0"
id = "artifacts/flipscan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24054

[services.development]
run = "pnpm --filter @workspace/flipscan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flipscan", "run", "build" ]
publicDir = "artifacts/flipscan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24054"
BASE_PATH = "/"
